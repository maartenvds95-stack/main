<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familie Steenhoven | Avontuur Wacht</title>
    <style>
        /* Importeren van avontuurlijke en moderne Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f1ea; /* Een lichte, aardse zandkleur */
            color: #2c3e50;
        }

        /* Hero Sectie met de Berg Achtergrond */
        .hero-section {
            height: 100vh;
            /* Donkere overlay over de bergafbeelding zodat de witte tekst goed leesbaar is */
            background-image: linear-gradient(to bottom, rgba(20, 30, 20, 0.4), rgba(20, 30, 20, 0.8)), url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Zorgt voor een gaaf parallax scroll-effect */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 0 20px;
        }

        .hero-section h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 4.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .hero-section p {
            font-size: 1.5rem;
            max-width: 650px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-avontuur {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            background-color: #d35400; /* Kampvuur oranje */
            color: #fff;
            text-decoration: none;
            border-radius: 3px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            letter-spacing: 2px;
        }

        .btn-avontuur:hover {
            background-color: #e67e22;
            transform: translateY(-3px);
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        footer {
            background-color: #2c3e50;
            color: #f4f1ea;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <h1>De Steenhoven Fam</h1>
        <p>Samen de natuur in, bergen beklimmen en herinneringen maken die een leven lang meegaan.</p>
        <div class="button-group">
            <a href="http://steenhovenfam.nl/annebeth" class="btn-avontuur">Naar Annebeth's Avonturen</a>
        </div>
    </header>

    <footer>
        <p>&copy; 2024 Familie Steenhoven. Alle rechten voorbehouden.</p>
    </footer>

</body>
</html>
